version: '3.8'

services:
  # ========================================================
  # 1. CÁC CƠ SỞ DỮ LIỆU (Mỗi Service một DB riêng)
  # ========================================================

  # Database cho Identity Service (Quản lý tài khoản, login)
  db-identity:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db_identity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d identity_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Database cho User Service (Quản lý profile, thông tin người dùng)
  db-user:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - db_user_data:/var/lib/postgresql/data

  # Database cho Course Service (Quản lý khóa học, bài học)
  db-course:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: course_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    volumes:
      - db_course_data:/var/lib/postgresql/data

  # ========================================================
  # 2. MESSAGE BROKER (Giao tiếp liên dịch vụ)
  # ========================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"   # Port cho ứng dụng kết nối
      - "15672:15672" # Port cho giao diện quản lý (Web UI)

  # ========================================================
  # 2.5 CONFIG SERVER (CONSUL)
  # ========================================================
  consul:
    image: hashicorp/consul:1.19
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    ports:
      - "8500:8500"   # HTTP API & UI
      - "8600:8600"   # DNS
      - "8600:8600/udp"
    environment:
      CONSUL_BIND_INTERFACE: eth0
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sidecar chạy init.sh sau khi Consul healthy để seed cấu hình vào KV Store
  consul-init:
    image: curlimages/curl:latest
    volumes:
      - ./docker/consul/init.sh:/consul/init.sh:ro
    environment:
      CONSUL_URL: http://consul:8500
    depends_on:
      consul:
        condition: service_healthy
    command: sh /consul/init.sh
    restart: "no"

  # ========================================================
  # 3. CÁC MICROSERVICES (NestJS)
  # ========================================================

  identity-service:
    build:
      context: .
      dockerfile: ./apps/identity-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@db-identity:5432/identity_db
      - CONSUL_URL=http://consul:8500
      - LOGSTASH_HOST=logstash
    depends_on:
      db-identity:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully

  user-service:
    build:
      context: .
      dockerfile: ./apps/user-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@db-user:5432/user_db
      - CONSUL_URL=http://consul:8500
      - LOGSTASH_HOST=logstash
    depends_on:
      - db-user
      - consul

  exam-service:
    build:
      context: .
      dockerfile: ./apps/exam-service/Dockerfile
    environment:
      - CONSUL_URL=http://consul:8500
      - LOGSTASH_HOST=logstash
    depends_on:
      - consul

  course-service:
    build:
      context: .
      dockerfile: ./apps/course-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@db-course:5432/course_db
      - CONSUL_URL=http://consul:8500
      - LOGSTASH_HOST=logstash
    depends_on:
      - db-course
      - consul

  question-service:
    build:
      context: .
      dockerfile: ./apps/question-service/Dockerfile
    environment:
      - CONSUL_URL=http://consul:8500
      - LOGSTASH_HOST=logstash
    depends_on:
      - consul

  notification-service:
    build:
      context: .
      dockerfile: ./apps/notification-service/Dockerfile
    environment:
      - CONSUL_URL=http://consul:8500
      - LOGSTASH_HOST=logstash
    depends_on:
      - consul

  analytics-service:
    build:
      context: .
      dockerfile: ./apps/analytics-service/Dockerfile
    environment:
      - CONSUL_URL=http://consul:8500
      - LOGSTASH_HOST=logstash
    depends_on:
      - consul

  simulation-service:
    build:
      context: .
      dockerfile: ./apps/simulation-service/Dockerfile
    environment:
      - CONSUL_URL=http://consul:8500
      - LOGSTASH_HOST=logstash
    depends_on:
      - consul

  # ========================================================
  # 4. API GATEWAY (KONG)
  # ========================================================
  kong:
    image: kong:latest
    user: "root"
    volumes:
      - ./kong:/usr/local/kong/declarative
    environment:
      KONG_DATABASE: "off" # Chế độ DB-less
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - "8000:8000" # Cổng gọi API chính
      - "8001:8001" # Cổng Admin API để kiểm tra cấu hình

  # ========================================================
  # 5. OBSERVABILITY (ELK Stack)
  # ========================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.3
    volumes:
      - ./docker/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044" # Cổng TCP nhận log
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.3
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
  # ========================================================
  # 6. Keycloak 
  # ========================================================
# Database riêng cho Keycloak
  db-keycloak:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    volumes:
      - db_keycloak_data:/var/lib/postgresql/data

  # Keycloak Service
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Cấu hình để chạy sau Gateway hoặc Proxy
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      - db-keycloak
volumes:
  db_identity_data:
  db_user_data:
  db_course_data:
  consul_data:
  elasticsearch_data:
  db_keycloak_data:
