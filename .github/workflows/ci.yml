name: CI/CD Pipeline cho Microservices

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ==========================================
  # 1. QUALITY GATE
  # ==========================================
  quality-gate:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx turbo run prisma:generate

      - name: Format & Lint Check
        run: npx @biomejs/biome ci .

      - name: TypeScript Check
        run: npx turbo run check-types

      - name: Run Tests
        run: npx turbo run test

  # ==========================================
  # 2. DETECT CHANGES
  # ==========================================
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      services: ${{ steps.set-matrix.outputs.services }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            identity-service:
              - 'apps/identity-service/**'
              - 'packages/**'
            analytics-service:
              - 'apps/analytics-service/**'
              - 'packages/**'
            course-service:
              - 'apps/course-service/**'
              - 'packages/**'
            exam-service:
              - 'apps/exam-service/**'
              - 'packages/**'
            notification-service:
              - 'apps/notification-service/**'
              - 'packages/**'
            question-service:
              - 'apps/question-service/**'
              - 'packages/**'
            simulation-service:
              - 'apps/simulation-service/**'
              - 'packages/**'
            user-service:
              - 'apps/user-service/**'
              - 'packages/**'

      - name: Build matrix
        id: set-matrix
        run: |
          CHANGED='${{ steps.filter.outputs.changes }}'
          ALL_SERVICES='["identity-service","analytics-service","course-service","exam-service","notification-service","question-service","simulation-service","user-service"]'

          SERVICES="[]"

          for SERVICE in $(echo $ALL_SERVICES | jq -rc '.[]'); do
            CHANGED_MATCH=$(echo $CHANGED | jq -rc --arg s "$SERVICE" 'map(select(. == $s)) | length')
            if [ "$CHANGED_MATCH" -gt "0" ]; then
              echo "$SERVICE: có thay đổi → build"
              SERVICES=$(echo $SERVICES | jq -rc --arg s "$SERVICE" '. + [$s]')
              continue
            fi

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://ghcr.io/v2/nhactaohocbai/luyen-thi-lai-xe-$SERVICE/manifests/latest")

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "$SERVICE: image chưa tồn tại (HTTP $HTTP_STATUS) → build"
              SERVICES=$(echo $SERVICES | jq -rc --arg s "$SERVICE" '. + [$s]')
            else
              echo "$SERVICE: không thay đổi + image đã có → skip"
            fi
          done

          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "Final services to build: $SERVICES"

  # ==========================================
  # 3. BUILD
  # ==========================================
  build:
    name: Build Services
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    if: |
      needs.detect-changes.outputs.services != '[]' &&
      needs.detect-changes.outputs.services != '' &&
      needs.detect-changes.outputs.services != 'null'

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:latest
            ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Get image size
        id: size
        if: always()
        run: |
          docker pull ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:latest 2>/dev/null || true
          SIZE=$(docker image inspect ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:latest \
            --format='{{.Size}}' 2>/dev/null | awk '{printf "%.1f MB", $1/1024/1024}' || echo "N/A")
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Build Summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [[ "$STATUS" == "success" ]]; then ICON="✅"
            elif [[ "$STATUS" == "cancelled" ]]; then ICON="⏹️"
            else ICON="❌"
            fi
          echo "## $ICON ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Image size | ${{ steps.size.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
